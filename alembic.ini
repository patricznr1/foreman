# ============================================================
#  FOREMAN — alembic.ini
#  Zweck: Alembic-Konfiguration für die async-Migrationen.
#  Architektur-Einordnung: DB-Schicht (Schicht 2). Die Datenbank-URL wird
#  NICHT hier hinterlegt, sondern zur Laufzeit aus der Config gelesen
#  (migrations/env.py), damit kein Secret im Repo landet (Repo ist öffentlich).
# ============================================================

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# sqlalchemy.url wird in migrations/env.py aus settings.database_url gesetzt.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
