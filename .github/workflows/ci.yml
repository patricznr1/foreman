# ============================================================
#  FOREMAN — CI (Quality Gates, GROUND_TRUTH §10.2)
#  Läuft bei jedem Push auf main und bei jedem Pull Request:
#  mypy --strict · ruff (lint + format) · pytest gegen eine ECHTE
#  TimescaleDB/pgvector (Service-Container) — inklusive Integrationstests,
#  Red-Team-Injection und Coverage-Gate (≥ 85 %, in pyproject erzwungen).
#  Die @smoke-Tests (echtes Ollama) skippen sauber, die @ner-Tests
#  (560-MB-spaCy-Modell) sind opt-in und im Pflichtlauf deselektiert.
# ============================================================
name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: mypy · ruff · pytest (real TimescaleDB)
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: foreman
          POSTGRES_PASSWORD: foreman
          POSTGRES_DB: foreman_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U foreman -d foreman_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      # Integrationstests laufen gegen den Service-Container (conftest liest diese Var).
      FOREMAN_TEST_DATABASE_URL: postgresql+asyncpg://foreman:foreman@localhost:5433/foreman_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install uv
        # Exakter Pin: setup-uv publiziert ab v8 keine Major-/Minor-Tags mehr
        # (Supply-Chain-Härtung) — daher immutable Version statt @v8.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev)
        run: uv sync --extra dev

      - name: Type check — mypy --strict
        run: uv run mypy

      - name: Lint — ruff check
        run: uv run ruff check

      - name: Format — ruff format --check
        run: uv run ruff format --check

      - name: Tests + coverage — pytest (integration, red-team, ≥85 %)
        run: uv run pytest

  frontend-gates:
    name: frontend · tokens · tsc · eslint · vitest · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        # Auf Commit-Hash gepinnt (Supply-Chain-Härtung, zizmor); persist-credentials
        # aus, da nach dem Checkout keine Git-Operationen folgen.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Design-Tokens in sync (generierte CSS == Quelle)
        run: npm run tokens:check

      - name: Type check — tsc --noEmit (strict)
        run: npm run typecheck

      - name: Lint — eslint
        run: npm run lint

      - name: Tests — vitest
        run: npm test

      - name: Build — next build
        run: npm run build
