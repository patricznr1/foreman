# ============================================================
#  FOREMAN — postgres.conf
#  Zweck: TimescaleDB-Tuning für die insert-heave `readings`-Hypertable.
#  Architektur-Einordnung: DB-Schicht (Schicht 2). Startwerte für eine
#  Single-Node-Workstation (~64 GB RAM). Verbindliche Referenz:
#  docs/research/timescaledb-tuning-readings.md §4.2.
#  HINWEIS: Begründete Startwerte, KEINE universellen Konstanten —
#  vor Produktivsetzung gegen reale Insert-Raten verifizieren.
# ============================================================

# --- TimescaleDB laden (Pflicht, sonst kein Hypertable/CAGG) ---
shared_preload_libraries = 'timescaledb'

# --- Speicher (Faustregeln für ~64 GB RAM, Research §4.2) ---
shared_buffers = '16GB'             # ~25 % RAM
effective_cache_size = '48GB'       # ~75 % RAM
work_mem = '64MB'                   # pro Sort/Hash; bei vielen Workern vorsichtig
maintenance_work_mem = '2GB'        # Kompression / Index-Builds

# --- Hintergrund-Prozesse (Policies/CAGG-Refreshes) ---
max_worker_processes = 16
timescaledb.max_background_workers = 8

# --- WAL / Checkpoints unter Insert-Last ---
wal_compression = on
checkpoint_timeout = '15min'
max_wal_size = '8GB'                # weniger Checkpoints unter Insert-Last

# --- Durabilität ---
# synchronous_commit = off  # NUR bewusst aktivieren: Durchsatz vs. Verlust der
#                           # letzten Transaktionen bei Crash. Pro Deployment festlegen.

# --- Verbindungen ---
listen_addresses = '*'
max_connections = 100
